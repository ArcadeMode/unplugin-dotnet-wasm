name: Validate

on:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  unit:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - run: pnpm install

      - name: Build plugin
        run: pnpm build:plugin

      - name: Build fixture
        run: pnpm build:sample

      - name: Run unit tests
        run: pnpm test:unit

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit-${{ matrix.os }}
          path: unplugin-dotnet-wasm/test-results/

  matrix:
    name: Run integration tests
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        platform: [node, browser]
        fingerprint: ['true', 'false']
        build_mode: [debug, publish]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install

      - name: Build plugin
        run: pnpm build:plugin

      - name: Build library
        run: |
          if [ "${{ matrix.build_mode }}" = "publish" ]; then
            pnpm publish:library:${{ matrix.fingerprint == 'true' && 'fingerprint' || 'nofingerprint' }}
          else
            pnpm build:library:${{ matrix.fingerprint == 'true' && 'fingerprint' || 'nofingerprint' }}
          fi

      - name: Build fixtures
        run: pnpm build:fixtures --mode=${{ matrix.build_mode == 'publish' && 'release' || 'debug' }} --platform=${{ matrix.platform }}

      - name: Install Playwright browsers
        if: matrix.platform == 'browser'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            pnpm --dir test/integration exec playwright install --with-deps chromium
          else
            pnpm --dir test/integration exec playwright install chromium
          fi

      - name: Run integration tests
        run: pnpm test:matrix --integration --platform=${{ matrix.platform }} --fingerprint=${{ matrix.fingerprint }} --build-mode=${{ matrix.build_mode }}

      - name: Run e2e tests
        run: pnpm test:matrix --e2e --platform=${{ matrix.platform }} --fingerprint=${{ matrix.fingerprint }} --build-mode=${{ matrix.build_mode }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.fingerprint }}-${{ matrix.build_mode }}
          path: test/integration/test-results/

  matrix-none:
    name: Run integration tests (no build)
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install

      - name: Build plugin
        run: pnpm build:plugin

      - name: Clean library
        run: pnpm clean:library

      - name: Run test matrix
        run: pnpm test:matrix --fingerprint=false --build-mode=none --integration

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-none
          path: test/integration/test-results/

  matrix-dev:
    name: Run dev-server tests
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        fingerprint: ['true', 'false']
        build_mode: [debug, publish]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - run: pnpm install

      - name: Build plugin
        run: pnpm build:plugin

      - name: Build library
        run: |
          if [ "${{ matrix.build_mode }}" = "publish" ]; then
            pnpm publish:library:${{ matrix.fingerprint == 'true' && 'fingerprint' || 'nofingerprint' }}
          else
            pnpm build:library:${{ matrix.fingerprint == 'true' && 'fingerprint' || 'nofingerprint' }}
          fi

      - name: Install Playwright chromium
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            pnpm --dir test/integration exec playwright install --with-deps chromium
          else
            pnpm --dir test/integration exec playwright install chromium
          fi

      - name: Run dev-server e2e
        run: pnpm test:matrix --e2e --serve-mode=server --platform=browser --fingerprint=${{ matrix.fingerprint }} --build-mode=${{ matrix.build_mode }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-dev-${{ matrix.fingerprint }}-${{ matrix.build_mode }}
          path: test/integration/test-results/

  results:
    name: Publish test results
    needs: [unit, matrix, matrix-none, matrix-dev]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: test-results-*
          path: results

      - name: Publish test results
        id: test-results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            results/**/*.junit.xml

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: all-test-results
          path: results/
