name: Validate

on:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  unit:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - run: pnpm install

      - name: Build plugin
        run: pnpm build:plugin

      - name: Run unit tests
        run: pnpm test:unit

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit-${{ matrix.os }}
          path: packages/unplugin-dotnet-wasm/test-results/

  matrix:
    name: Run integration tests
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        platform: [node, browser]
        fingerprint: ['true', 'false']
        build_mode: [debug, publish, none]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install

      - name: Build plugin
        run: pnpm build:plugin

      - name: Build library
        run: |
          if [ "${{ matrix.build_mode }}" = "none" ]; then
            pnpm clean:library
          elif [ "${{ matrix.build_mode }}" = "publish" ]; then
            pnpm publish:library:${{ matrix.fingerprint == 'true' && 'fingerprint' || 'nofingerprint' }}
          else
            pnpm build:library:${{ matrix.fingerprint == 'true' && 'fingerprint' || 'nofingerprint' }}
          fi

      - name: Build fixtures
        if: matrix.build_mode != 'none'
        run: pnpm build:fixtures --mode=${{ matrix.build_mode == 'publish' && 'release' || 'debug' }} --platform=${{ matrix.platform }}

      - name: Install Playwright browsers
        if: matrix.platform == 'browser' && matrix.build_mode != 'none'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            pnpm --dir test/integration exec playwright install --with-deps chromium
          else
            pnpm --dir test/integration exec playwright install chromium
          fi

      - name: Run test matrix
        run: pnpm test:matrix --platform=${{ matrix.platform }} --fingerprint=${{ matrix.fingerprint }} --build-mode=${{ matrix.build_mode }}${{ matrix.build_mode == 'none' && ' --integration' || '' }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.fingerprint }}-${{ matrix.build_mode }}
          path: test/integration/test-results/

  results:
    name: Publish test results
    needs: [unit, matrix]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true
          path: results

      - name: Publish test results
        id: test-results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            results/**/*.junit.xml
